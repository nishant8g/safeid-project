services:
  - type: web
    name: safeid-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.10.12
      # The base URL should be set to your Vercel URL (e.g., https://your-safeid.vercel.app)
      - key: BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
